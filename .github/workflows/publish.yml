name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish-vscode:
    name: Publish VS Code extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install extension dependencies
        run: npm ci
        working-directory: client

      - name: Package extension
        run: npx @vscode/vsce package --out neml2-langserv.vsix
        working-directory: client

      - name: Publish to marketplace
        run: npx @vscode/vsce publish --packagePath neml2-langserv.vsix
        working-directory: client
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-pypi:
    name: Publish Python package to PyPI
    runs-on: ubuntu-latest
    # Trusted publishing (OIDC) — no API token needed. The matching
    # publisher must be configured at
    # https://pypi.org/manage/project/neml2-langserv/settings/publishing/
    # (or via the pending-publisher flow before the first release).
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
